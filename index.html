<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <p id="date"></p>

      <h1 class="title">Number Guessing Game</h1>

      <div class="card">
        <h3 class="section-title">Select Level</h3>
        <div class="levels">
          <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
          <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
          <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>
        </div>
        <button id="playBtn" class="btn btn-primary">Play</button>
      </div>

      <div class="card">
        <h3 id="msg">Select a Level</h3>
        <div class="guess-row">
          <input type="text" id="guess" placeholder="Enter your guess...">
          <button id="guessBtn" class="btn btn-primary" disabled>Guess</button>
          <button id="giveUpBtn" class="btn btn-danger" disabled>Give Up</button>
        </div>
      </div>

      <div class="bottom">
        <div class="card">
          <h3 class="section-title">Stats</h3>
          <p id="wins">Total wins: 0</p>
          <p id="avgScore">Average Score: </p>
          <p id="fastest">Fastest Game: </p>
          <p id="avgTime">Average Time: </p>
        </div>

        <div class="card">
          <h3 class="section-title">Leaderboard</h3>
          <ol>
            <li name="leaderboard">--</li>
            <li name="leaderboard">--</li>
            <li name="leaderboard">--</li>
          </ol>
        </div>
      </div>

    </div>
  </body>
</html>
